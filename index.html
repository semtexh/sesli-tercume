<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sesli Tercüme</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
    --gold: #c9a84c; --gold-dim: #8a6e2f; --text: #f0ece0; --text-dim: #7a7a8a;
    --tr-color: #e8a84c; --en-color: #4ca8e8; --success: #4caf7a; --error: #e84c4c;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--gold), var(--gold-dim)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

  .setup { margin: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .voice-row { display: flex; gap: 8px; align-items: center; }
  .voice-row label { font-size: 11px; color: var(--text-dim); white-space: nowrap; min-width: 80px; }
  .voice-select { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 12px; outline: none; }
  .setup-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .room-bar { margin: 0 12px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; gap: 8px; align-items: center; }
  .room-bar label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .room-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 15px; font-weight: 700; outline: none; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
  .join-btn { background: var(--en-color); color: #000; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .join-btn.connected { background: var(--success); }

  .speakers { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 0 12px 12px; }
  .speaker-card { background: var(--surface); border: 2px solid var(--border); border-radius: 18px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; min-height: 180px; transition: border-color 0.3s, background 0.3s; }
  .speaker-card.tr-card { border-color: rgba(232,168,76,0.3); }
  .speaker-card.en-card { border-color: rgba(76,168,232,0.3); }
  .speaker-card.tr-card.listening { border-color: var(--tr-color); animation: pulse-border 1s infinite; }
  .speaker-card.en-card.listening { border-color: var(--en-color); animation: pulse-border 1s infinite; }
  .speaker-card.incoming { background: rgba(76,175,122,0.08); border-color: var(--success) !important; animation: none !important; }
  @keyframes pulse-border { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .speaker-flag { font-size: 28px; }
  .speaker-name { font-size: 14px; font-weight: 700; }
  .speaker-lang { font-size: 10px; color: var(--text-dim); margin-top: -6px; text-align: center; }
  .btn-row { display: flex; gap: 10px; align-items: center; }
  .mic-btn { width: 68px; height: 68px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; transition: transform 0.15s; }
  .tr-card .mic-btn { background: linear-gradient(135deg,#e8a84c,#c07830); box-shadow: 0 4px 16px rgba(232,168,76,0.35); }
  .en-card .mic-btn { background: linear-gradient(135deg,#4ca8e8,#2080c0); box-shadow: 0 4px 16px rgba(76,168,232,0.35); }
  .mic-btn:active { transform: scale(0.92); }
  .tr-card .mic-btn.recording { animation: mic-pulse-tr 0.8s infinite; }
  .en-card .mic-btn.recording { animation: mic-pulse-en 0.8s infinite; }
  @keyframes mic-pulse-tr { 0%{transform:scale(1);box-shadow:0 0 0 0 rgba(232,168,76,0.7)} 70%{transform:scale(1.06);box-shadow:0 0 0 16px rgba(232,168,76,0)} 100%{transform:scale(1)} }
  @keyframes mic-pulse-en { 0%{transform:scale(1);box-shadow:0 0 0 0 rgba(76,168,232,0.7)} 70%{transform:scale(1.06);box-shadow:0 0 0 16px rgba(76,168,232,0)} 100%{transform:scale(1)} }
  .repeat-btn { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .repeat-btn:active { transform: scale(0.92); }
  .repeat-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .mic-btn-label { font-size: 10px; color: var(--text-dim); margin-top: -4px; }
  .status-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; width: 100%; }
  .status-bar-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.4s; }
  .tr-card .status-bar-fill { background: var(--tr-color); }
  .en-card .status-bar-fill { background: var(--en-color); }
  .result-box { width: 100%; min-height: 54px; background: var(--bg); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .result-original { font-size: 11px; color: var(--text-dim); font-style: italic; min-height: 14px; }
  .result-translated { font-size: 13px; font-weight: 500; min-height: 18px; }
  .result-translated.playing { color: var(--gold); }
  .divider { display: flex; align-items: center; gap: 10px; padding: 0 12px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-icon { font-size: 16px; color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">🗣️</div>
  <div>
    <h1>Sesli Tercüme</h1>
    <p>Türkçe ↔ English — Gemini</p>
  </div>
</header>

<div class="setup">
  <div class="setup-title">Ses Tercihi</div>
  <div class="voice-row">
    <label>🇹🇷 Annem</label>
    <select class="voice-select" id="trVoice">
      <option value="Zephyr">Zephyr (Kadın, sıcak)</option>
      <option value="Aoede">Aoede (Kadın, yumuşak)</option>
      <option value="Leda">Leda (Kadın)</option>
      <option value="Orus">Orus (Erkek)</option>
      <option value="Charon">Charon (Erkek, derin)</option>
    </select>
  </div>
  <div class="voice-row">
    <label>🇺🇸 Çocuklar</label>
    <select class="voice-select" id="enVoice">
      <option value="Puck">Puck (Genç, enerjik)</option>
      <option value="Fenrir">Fenrir (Genç erkek)</option>
      <option value="Kore">Kore (Genç kadın)</option>
      <option value="Aoede">Aoede (Kadın)</option>
      <option value="Charon">Charon (Erkek)</option>
    </select>
  </div>
</div>

<div class="room-bar">
  <label>Oda</label>
  <input type="text" class="room-input" id="roomCode" placeholder="AILE" maxlength="8">
  <button class="join-btn" id="joinBtn" onclick="toggleRoom()">Bağlan</button>
</div>

<div class="speakers">
  <div class="speaker-card tr-card" id="trCard">
    <span class="speaker-flag">🇹🇷</span>
    <div class="speaker-name">ANNEM</div>
    <div class="speaker-lang">Türkçe konuşur → İngilizceye çevrilir</div>
    <div class="btn-row">
      <button class="mic-btn" id="trMicBtn" onclick="startListening('tr')">🎤</button>
      <button class="repeat-btn" onclick="repeatLast('tr')" title="Tekrarla">🔁</button>
    </div>
    <div class="mic-btn-label" id="trMicLabel">Bas ve konuş</div>
    <div class="status-bar"><div class="status-bar-fill" id="trBar"></div></div>
    <div class="result-box">
      <div class="result-original" id="trOriginal">—</div>
      <div class="result-translated" id="trTranslated">—</div>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-icon">⇅</div>
    <div class="divider-line"></div>
  </div>

  <div class="speaker-card en-card" id="enCard">
    <span class="speaker-flag">🇺🇸</span>
    <div class="speaker-name">ÇOCUKLAR</div>
    <div class="speaker-lang">English → Türkçeye çevrilir</div>
    <div class="btn-row">
      <button class="mic-btn" id="enMicBtn" onclick="startListening('en')">🎤</button>
      <button class="repeat-btn" onclick="repeatLast('en')" title="Repeat">🔁</button>
    </div>
    <div class="mic-btn-label" id="enMicLabel">Press and speak</div>
    <div class="status-bar"><div class="status-bar-fill" id="enBar"></div></div>
    <div class="result-box">
      <div class="result-original" id="enOriginal">—</div>
      <div class="result-translated" id="enTranslated">—</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://bdrrigwrhpuhaqvqghht.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkcnJpZ3dyaHB1aGFxdnFnaGh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzIzNTMsImV4cCI6MjA5MDAwODM1M30.nOGOhdh12wHmkLBAbhKa2LzMxjFiJXrWi3JnhMOSceA';
  const TRANSLATE_URL = 'https://bdrrigwrhpuhaqvqghht.supabase.co/functions/v1/tercume-tts';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  let channel = null;
  let isConnected = false;
  let lastAudio = { tr: null, en: null };

  // Load prefs
  document.getElementById('trVoice').value = localStorage.getItem('t_trVoice') || 'Zephyr';
  document.getElementById('enVoice').value = localStorage.getItem('t_enVoice') || 'Puck';
  document.getElementById('roomCode').value = localStorage.getItem('t_roomCode') || 'AILE';

  document.getElementById('trVoice').onchange = () => localStorage.setItem('t_trVoice', document.getElementById('trVoice').value);
  document.getElementById('enVoice').onchange = () => localStorage.setItem('t_enVoice', document.getElementById('enVoice').value);

  // Room
  async function toggleRoom() {
    if (isConnected) {
      await channel.unsubscribe();
      channel = null;
      isConnected = false;
      document.getElementById('joinBtn').textContent = 'Bağlan';
      document.getElementById('joinBtn').classList.remove('connected');
      return;
    }
    const code = document.getElementById('roomCode').value.trim().toUpperCase();
    if (!code) { alert('Oda kodu gir!'); return; }
    localStorage.setItem('t_roomCode', code);

    channel = supabaseClient.channel('tercume-' + code, { config: { broadcast: { self: false } } });
    channel.on('broadcast', { event: 'translation' }, ({ payload }) => handleIncoming(payload));
    await channel.subscribe();

    isConnected = true;
    document.getElementById('joinBtn').textContent = '🟢 Bağlı';
    document.getElementById('joinBtn').classList.add('connected');
  }

  async function handleIncoming(payload) {
    const { fromLang, original, translated, audio } = payload;

    document.getElementById(fromLang + 'Original').textContent = original;
    const transEl = document.getElementById(fromLang + 'Translated');
    transEl.textContent = translated;
    transEl.classList.add('playing');

    const card = document.getElementById(fromLang + 'Card');
    card.classList.add('incoming');
    setTimeout(() => { card.classList.remove('incoming'); transEl.classList.remove('playing'); }, 3000);

    // Play audio received from broadcast
    if (audio) {
      await playBase64Audio(audio);
      lastAudio[fromLang] = audio;
    }
  }

  // Speech recognition
  let recognition = null, isListening = false, currentLang = null;
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setBar(lang, pct) { document.getElementById(lang + 'Bar').style.width = pct + '%'; }
  function setLabel(lang, text) { document.getElementById(lang + 'MicLabel').textContent = text; }

  async function startListening(lang) {
    if (isListening) { stopListening(); return; }
    if (!SpeechRec) { alert('Chrome kullanın!'); return; }

    isListening = true;
    currentLang = lang;
    document.getElementById(lang + 'Card').classList.add('listening');
    const btn = document.getElementById(lang + 'MicBtn');
    btn.classList.add('recording');
    btn.textContent = '⏹️';
    setLabel(lang, lang === 'tr' ? 'Dinliyor...' : 'Listening...');
    setBar(lang, 20);

    recognition = new SpeechRec();
    recognition.lang = lang === 'tr' ? 'tr-TR' : 'en-US';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = async (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById(lang + 'Original').textContent = transcript;
      if (e.results[e.results.length - 1].isFinal) {
        setBar(lang, 50);
        setLabel(lang, lang === 'tr' ? 'Çeviriliyor...' : 'Translating...');
        await translateAndBroadcast(lang, transcript);
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'not-allowed') alert('Mikrofon izni ver!');
      stopListening();
    };
    recognition.onend = () => { if (isListening) stopListening(); };
    try { recognition.start(); } catch(e) { alert('Mikrofon hatası: ' + e.message); stopListening(); }
  }

  function stopListening() {
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    if (currentLang) {
      const lang = currentLang;
      document.getElementById(lang + 'Card').classList.remove('listening');
      const btn = document.getElementById(lang + 'MicBtn');
      btn.classList.remove('recording');
      btn.textContent = '🎤';
      setLabel(lang, lang === 'tr' ? 'Bas ve konuş' : 'Press and speak');
      setBar(lang, 0);
    }
    isListening = false;
    currentLang = null;
  }

  async function translateAndBroadcast(fromLang, text) {
    const trVoice = document.getElementById('trVoice').value;
    const enVoice = document.getElementById('enVoice').value;

    try {
      const res = await fetch(TRANSLATE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON}` },
        body: JSON.stringify({ text, fromLang, trVoice, enVoice })
      });

      const data = await res.json();
      if (data.error) {
        document.getElementById(fromLang + 'Translated').textContent = '⚠️ ' + data.error;
        stopListening(); return;
      }

      const { translated, audio } = data;

      // Show translation
      const transEl = document.getElementById(fromLang + 'Translated');
      transEl.textContent = translated;
      transEl.classList.add('playing');
      setBar(fromLang, 85);
      setLabel(fromLang, fromLang === 'tr' ? 'Sesli okunuyor...' : 'Speaking...');

      // Save for repeat
      lastAudio[fromLang] = audio;

      // Broadcast to other device (send audio too so they play it)
      if (isConnected && channel) {
        await channel.send({
          type: 'broadcast', event: 'translation',
          payload: { fromLang, original: text, translated, audio }
        });
      }

      // Play locally
      if (audio) await playBase64Audio(audio);

      transEl.classList.remove('playing');
      setBar(fromLang, 0);
      setLabel(fromLang, fromLang === 'tr' ? 'Bas ve konuş' : 'Press and speak');

    } catch(e) {
      document.getElementById(fromLang + 'Translated').textContent = '⚠️ Hata: ' + e.message;
      setBar(fromLang, 0);
    }
    stopListening();
  }

  async function playBase64Audio(b64) {
    try {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      await new Promise((res) => { audio.onended = res; audio.onerror = res; audio.play().catch(res); });
      URL.revokeObjectURL(url);
    } catch(e) { console.error('Audio play error:', e); }
  }

  async function repeatLast(lang) {
    if (lastAudio[lang]) await playBase64Audio(lastAudio[lang]);
  }
</script>
</body>
</html>
